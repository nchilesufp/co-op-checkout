query CartPaymentMethodsTransformRunInput {
  cart {
    buyerIdentity {
      customer {
        coop: metafield(namespace: "custom", key: "co_op") {
          value
        }
        plant: metafield(namespace: "custom", key: "plant") {
          value
        }
      }
    }
  }
  paymentMethods {
    id
    name
  }
}
