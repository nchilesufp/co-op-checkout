# Learn more about configuring your checkout UI extension:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration

# The version of APIs your extension will receive. Learn more:
# https://shopify.dev/docs/api/usage/versioning
api_version = "2026-01"

[[extensions]]
name = "checkout-ui"
handle = "checkout-ui"
type = "ui_extension"
uid = "fddfc370-27c7-c30f-4ee0-a927194e2accadefd40c"

# Controls where in Shopify your extension will be injected,
# and the file that contains your extension’s source code. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/extension-targets-overview

[[extensions.targeting]]
module = "./src/Checkout.jsx"
target = "purchase.checkout.block.render"

[extensions.capabilities]
api_access = true
block_progress = true

[extensions.settings]

[[extensions.settings.fields]]
key = "coop_radio_label"
type = "single_line_text_field"
name = "Co-op Radio Question"
description = "Yes/no question shown during Co-op checkout (e.g. 'Is this order for Lowe's / Home Depot?'). Leave blank to hide. Answer is stored as the 'Big Box Order' order attribute."

[[extensions.settings.fields]]
key = "coop_payment_handle"
type = "single_line_text_field"
name = "(Advanced) Co-op Payment Handle"
description = "The handle for the Co-op manual payment method (e.g. custom-manual-payment-abc123). Discover via console.log in the extension."

[[extensions.settings.fields]]
key = "plant_payment_handle"
type = "single_line_text_field"
name = "(Advanced) Plant Payment Handle"
description = "The handle for the Plant manual payment method (e.g. custom-manual-payment-def456). Discover via console.log in the extension."
